<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submit Feedback | R2 Pilot Recruitment Hub</title>
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>R2 Pilot Recruitment Hub</h1>
      <nav>
  <a href="./participant-dashboard.html">Dashboard</a>
  <a href="./participant-status.html">My Status</a>
  <a href="./participant-progress.html">My Progress</a>
  <a href="./submit-feedback.html">Submit Feedback</a>
  <a href="./participant-feedback-history.html">My Feedback</a>
</nav>
    </div>
  </header>

  <main class="container">
    <section class="page-shell narrow">
      <h2>Submit Feedback</h2>
      <p class="muted">
        Use this form to submit an issue, finding, suggestion, or request related to your pilot experience.
      </p>

      <form id="feedback-form">
        <div>
          <label for="kind">Type</label>
          <select id="kind" name="kind" required>
            <option value="">Select one</option>
            <option value="issue">Issue</option>
            <option value="finding">Finding</option>
            <option value="suggestion">Suggestion</option>
            <option value="request">Request</option>
          </select>
        </div>

        <div>
          <label for="r2_ready_area">R2 Ready Area</label>
          <input id="r2_ready_area" name="r2_ready_area" type="text" required placeholder="Example: onboarding, participant dashboard" />
        </div>

        <div>
          <label for="title">Title</label>
          <input id="title" name="title" type="text" required />
        </div>

        <div>
          <label for="details">Details</label>
          <textarea id="details" name="details" rows="8" required></textarea>
        </div>

        <div id="expected-behavior-block">
          <label for="expected_behavior">Expected Behavior</label>
          <textarea id="expected_behavior" name="expected_behavior" rows="4"></textarea>
        </div>

        <div id="actual-behavior-block">
          <label for="actual_behavior">Actual Behavior</label>
          <textarea id="actual_behavior" name="actual_behavior" rows="4"></textarea>
        </div>

        <div id="reproduction-steps-block">
          <label for="reproduction_steps">Reproduction Steps</label>
          <textarea id="reproduction_steps" name="reproduction_steps" rows="6"></textarea>
        </div>

        <div>
          <label for="severity">Severity</label>
          <select id="severity" name="severity" required>
            <option value="">Select one</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>

        <button type="submit">Submit Feedback</button>
        <p id="feedback-message" class="message"></p>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./assets/js/config.js"></script>
  <script src="./assets/js/supabase-client.js"></script>
<script src="./assets/js/auth-guards.js"></script>
  <script src="./assets/js/submit-feedback.js"></script>
</body>
</html>
