<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Password Reset | R2 Pilot Recruitment Hub</title>
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>R2 Pilot Recruitment Hub</h1>
      <nav>
        <a href="./index.html">Home</a>
        <a href="./admin-login.html">Admin Login</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-shell narrow">
      <h2>Reset Admin Password</h2>
      <p class="muted">Use the secure link from your email, then choose a new password.</p>

      <form id="admin-reset-password-form">
        <div>
          <label for="new_password">New Password</label>
          <input id="new_password" name="new_password" type="password" minlength="12" autocomplete="new-password" required />
        </div>

        <div>
          <label for="confirm_password">Confirm New Password</label>
          <input id="confirm_password" name="confirm_password" type="password" minlength="12" autocomplete="new-password" required />
        </div>

        <button type="submit">Update Password</button>
        <p id="admin-reset-password-message" class="message"></p>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./assets/js/config.js"></script>
  <script src="./assets/js/supabase-client.js"></script>
  <script src="./assets/js/admin-reset-password.js"></script>
</body>
</html>
